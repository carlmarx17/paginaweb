<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo de Saberes - Guías de Estudio</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/library.css">
</head>

<body>
    <!-- Navegación compartida se inyectará aquí -->
    <div id="shared-navbar"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <header class="library-header" style="margin-top: 70px;">
        <div class="container"
            style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <a href="../index.html" class="logo"
                style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
                <div class="logo-icon" style="background: var(--gradiente-secundario);">
                    <i class="fas fa-book-sparkles"></i>
                </div>
                <div>
                    <h1
                        style="font-size: 1.2rem; margin: 0; background: var(--gradiente-secundario); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">
                        Universo de Saberes</h1>
                    <span
                        style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; font-weight: 700;">Ciencia
                        & Humanidades</span>
                </div>
            </a>
            <!-- React will handle the search box inside the main container -->
        </div>
    </header>

    <main class="container" style="padding: 3rem 1rem;">
        <!-- React App Mount Point -->
        <div id="guias-root">
            <div style="text-align: center; padding: 4rem;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--color-secundario);"></i>
                <p style="margin-top: 1rem; color: var(--slate-500);">Cargando experiencia interactiva...</p>
            </div>
        </div>
    </main>

    <!-- React Logic -->
    <script src="../js/components/SearchFilter.js"></script>
    <script type="module">
        import { guidesData } from '../js/data.js';
        import { openModal } from '../js/library-utils.js'; // I'll refactor library.js a bit

        const root = ReactDOM.createRoot(document.getElementById('guias-root'));
        root.render(React.createElement(window.SearchFilter, { data: guidesData, openModal: window.openModal }));
    </script>

    <!-- Legacy utils for Modal (refactored from library.js) -->
    <script src="../js/library-utils.js"></script>

    <!-- Scripts -->
    <!-- Footer compartido se inyectará aquí -->
    <div id="shared-footer"></div>

    <script src="../js/shared-nav.js"></script>
    <!-- Type module allows using imports in library.js -->
    <script type="module" src="../js/library.js"></script>
</body>

</html>
