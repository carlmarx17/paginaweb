<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundos Literarios - Biblioteca 3D</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/library.css">
</head>

<body class="dark-theme">
    <!-- Navegación compartida se inyectará aquí -->
    <div id="shared-navbar"></div>

    <!-- Header Biblioteca (Mundos) -->
    <header class="library-header dark-mode" style="margin-top: 70px;">
        <div class="container"
            style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <a href="../index.html" class="logo"
                style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
                <div class="logo-icon"
                    style="background: linear-gradient(135deg, #d97706 0%, #b45309 100%); box-shadow: 0 0 15px rgba(217, 119, 6, 0.4);">
                    <i class="fas fa-book-open"></i>
                </div>
                <div>
                    <h1
                        style="font-family: 'Cinzel', serif; font-size: 1.4rem; margin: 0; color: #fef3c7; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
                        Biblioteca Infinita</h1>
                    <span
                        style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; color: #9ca3af;">Mundos
                        Literarios</span>
                </div>
            </a>

            <!-- Buscador -->
            <div class="search-box">
                <i class="fas fa-search search-icon" style="color: #6b7280;"></i>
                <input type="text" id="searchInput" placeholder="Buscar: Macondo, Dune, Orwell..."
                    style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: white;"
                    aria-label="Buscar libros">
            </div>
        </div>
    </header>

    <main class="container" style="padding: 2rem 1rem;">

        <!-- Barra de Filtros -->
        <div class="filters-bar" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);">
            <div style="width: 100%;">
                <div class="filter-group" style="justify-content: center;">
                    <button class="filter-btn active" data-filter="all"
                        style="background: #d97706; color: white; border-color: #d97706;">Todo</button>
                    <button class="filter-btn" data-filter="distopia"
                        style="background: transparent; color: #9ca3af; border-color: rgba(255,255,255,0.1);">Distopías</button>
                    <button class="filter-btn" data-filter="scifi"
                        style="background: transparent; color: #9ca3af; border-color: rgba(255,255,255,0.1);">Sci-Fi</button>
                    <button class="filter-btn" data-filter="clasico"
                        style="background: transparent; color: #9ca3af; border-color: rgba(255,255,255,0.1);">Clásicos</button>
                    <button class="filter-btn" data-filter="fantasia"
                        style="background: transparent; color: #9ca3af; border-color: rgba(255,255,255,0.1);">Fantasía</button>
                </div>
            </div>
        </div>

        <!-- Grid de Libros 3D -->
        <div id="libraryGrid" class="library-grid-books">
            <!-- 3D Books injected by JS -->
        </div>

        <!-- Estado Vacío -->
        <div id="emptyState" class="hidden" style="text-align: center; padding: 4rem 1rem; opacity: 0.5;">
            <i class="fas fa-ghost" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h3>No se encontraron libros</h3>
        </div>

    </main>

    <!-- Footer compartido se inyectará aquí -->
    <div id="shared-footer"></div>

    <!-- Scripts -->
    <script src="../js/shared-nav.js"></script>
    <script type="module" src="../js/library.js"></script>
</body>

</html>
