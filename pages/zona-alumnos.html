<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Alumnos - Profesor Carlos Martínez</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">

    <style>
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-portal {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            transition: all 0.3s ease;
            font-weight: 700;
        }

        .btn-portal:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            filter: brightness(1.1);
        }

        .logo-login {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            width: 60px;
            height: 60px;
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 15px rgba(37, 99, 235, 0.2);
        }

        .support-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #25d366;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
            transition: all 0.3s ease;
        }

        .support-float:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center">
            <div class="logo-login">
                <i class="fas fa-graduation-cap text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Clases Carlos Martínez</h1>
            <p class="text-slate-400 font-medium mb-10">Plataforma Educativa Privada</p>
        </div>

        <form action="#" class="space-y-6">
            <div>
                <label class="block text-slate-300 text-sm font-bold mb-2 ml-1">Usuario</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-slate-500">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" placeholder="Tu identificador de alumno" 
                        class="glass-input w-full pl-12 pr-4 py-3.5 rounded-xl font-medium placeholder:text-slate-600">
                </div>
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-bold mb-2 ml-1">Contraseña</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-slate-500">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" placeholder="••••••••" 
                        class="glass-input w-full pl-12 pr-4 py-3.5 rounded-xl font-medium placeholder:text-slate-600">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="btn-portal w-full py-4 rounded-xl text-lg shadow-xl shadow-blue-900/20">
                    Ingresar al Portal
                </button>
            </div>

            <div class="text-center pt-6">
                <a href="../index.html" class="text-slate-500 hover:text-white text-sm transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-arrow-left text-xs"></i> Volver al inicio
                </a>
            </div>
        </form>
    </div>

    <!-- Soporte Técnico -->
    <a href="https://wa.me/573004388301" target="_blank" class="support-float">
        <i class="fab fa-whatsapp text-xl"></i>
        <span>Soporte Técnico</span>
    </a>

    <div class="fixed bottom-6 text-slate-600 text-xs font-medium">
        &copy; 2026 Clases Carlos Martínez
    </div>
</body>

</html>
